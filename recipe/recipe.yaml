context:
  name: 'valkey'
  version: '6.1.1'

package:
  name: 'valkey-py'
  version: '${{ version }}'

source:
  # url: https://github.com/valkey-io/valkey-py/archive/refs/tags/v${{ version }}.zip
  url: 'https://github.com/valkey-io/valkey-py/archive/b0d9b12d29f94d7f89dfb4a7cccfde2a07c2a7c8.zip'
  sha256: 3032d5d6d546a9ccf5238b7c68555e8e193f28eb8daaaf8d5657a93ad471e33b

build:
  noarch: python
  number: 0
  script:
    env:
      PIP_USE_PEP517: '1'
    content:
      - 'python -m pip install --no-build-isolation .'

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - async-timeout >=4.0.3

  # https://github.com/valkey-io/valkey-py/blob/b0d9b12d29f94d7f89dfb4a7cccfde2a07c2a7c8/pyproject.toml#L72-L74
  run_constraints:
    - libvalkey-py >=4.0.1

    # ocsp
    - 'cryptography >=36.0.1'
    - 'pyopenssl >=23.2.1'
    - 'requests >=2.31.0'

tests:
  - python:
      imports:
        - valkey
      python_version: ${{ python_min }}.*

about:
  license: MIT
  license_file:
    - LICENSE
  summary: Valkey Python client based on a fork of redis-py
  homepage: https://github.com/valkey-io/valkey-py
  repository: https://github.com/valkey-io/valkey-py

extra:
  recipe-maintainers:
    - trim21
